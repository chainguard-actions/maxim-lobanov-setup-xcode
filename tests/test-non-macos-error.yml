name: Test error on non-macOS platform
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          xcode-version: latest
        continue-on-error: true
      - name: Assert action failed on Linux
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail on Linux platform, but got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed on non-macOS platform"
