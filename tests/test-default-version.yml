name: Test default xcode-version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        # No xcode-version input — should default to 'latest'
        continue-on-error: true
      - name: Assert action failed with platform error (not input error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # On Linux, the action should fail because it's not macOS,
          # not because of a missing or invalid input.
          # This confirms the default input ('latest') is accepted and
          # the failure is due to platform check, not input validation.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail on non-macOS platform, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action failed as expected on non-macOS platform with default input"
