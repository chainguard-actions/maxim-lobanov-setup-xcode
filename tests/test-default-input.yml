name: Test default input (no xcode-version specified)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        # No xcode-version input - should default to 'latest'
      - name: Assert version output is set
        env:
          VERSION: ${{ steps.action.outputs.version }}
        run: |
          echo "version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: expected version output to be non-empty when using default input"
            exit 1
          fi
          echo "PASS: version output is set to $VERSION with default input"
      - name: Assert path output is set and exists
        env:
          PATH_OUT: ${{ steps.action.outputs.path }}
        run: |
          echo "path: $PATH_OUT"
          if [ -z "$PATH_OUT" ]; then
            echo "FAIL: expected path output to be non-empty when using default input"
            exit 1
          fi
          if [ ! -d "$PATH_OUT" ]; then
            echo "FAIL: path '$PATH_OUT' does not exist or is not a directory"
            exit 1
          fi
          echo "PASS: path output is set to $PATH_OUT and exists"
      - name: Assert xcode-select is configured
        run: |
          SELECTED="$(xcode-select -p)"
          echo "xcode-select -p: $SELECTED"
          if [ -z "$SELECTED" ]; then
            echo "FAIL: xcode-select -p returned empty"
            exit 1
          fi
          echo "PASS: xcode-select is configured to $SELECTED"
