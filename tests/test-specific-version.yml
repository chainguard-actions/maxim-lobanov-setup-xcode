name: Test specific xcode-version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          xcode-version: "14"
        continue-on-error: true
      - name: Assert action failed on non-macOS platform
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # On Linux, the action should fail because it's not macOS.
          # This confirms the action accepts a specific version spec as input.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail on non-macOS platform, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed on non-macOS platform with specific version input"
